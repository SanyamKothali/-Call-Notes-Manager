<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- DASHBOARD SCREEN (Active by default) -->
    <section class="screen dashboard-screen active" id="dashboardScreen">
      <div class="dashboard-container">
        
        <!-- Header -->
        <header class="db-header">
          <div class="db-logo-section">
            <span class="db-logo-icon">📞</span>
            <h1>Call Notes Manager</h1>
          </div>
          <div class="db-header-actions">
            <!-- Theme Toggle -->
            <button type="button" class="theme-toggle-btn" id="pageThemeToggle" aria-label="Toggle Page Theme">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button type="button" class="btn-new-call" id="newCallBtn">
              <span>+ New Call</span>
            </button>
          </div>
        </header>

        <!-- Stats Row -->
        <section class="stats-grid">
          <div class="stat-card" data-stat="All" id="statCardAll">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">Total Notes</span>
          </div>
          <div class="stat-card" data-stat="Emergency" id="statCardEmergency">
            <span class="stat-value" id="statEmergency">0</span>
            <span class="stat-label">Emergency</span>
          </div>
          <div class="stat-card" data-stat="Important" id="statCardImportant">
            <span class="stat-value" id="statImportant">0</span>
            <span class="stat-label">Important</span>
          </div>
          <div class="stat-card" data-stat="Urgent" id="statCardUrgent">
            <span class="stat-value" id="statUrgent">0</span>
            <span class="stat-label">Urgent</span>
          </div>
          <div class="stat-card" data-stat="No Rush" id="statCardNoRush">
            <span class="stat-value" id="statNoRush">0</span>
            <span class="stat-label">No Rush</span>
          </div>
        </section>

        <!-- Search and Filters -->
        <section class="filter-section">
          <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search by name, town, purpose, category..." />
          </div>
          <div class="filter-pills">
            <button type="button" class="filter-pill active" data-category="All">All</button>
            <button type="button" class="filter-pill" data-category="Emergency">Emergency</button>
            <button type="button" class="filter-pill" data-category="Important">Important</button>
            <button type="button" class="filter-pill" data-category="Urgent">Urgent</button>
            <button type="button" class="filter-pill" data-category="No Rush">No Rush</button>
          </div>
        </section>

        <!-- Notes Section -->
        <section class="notes-section">
          <div class="notes-grid" id="notesGrid">
            <!-- Dynamically populated call cards -->
          </div>
          
          <!-- Empty State -->
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📂</div>
            <h3>No call notes found</h3>
            <p>Get started by creating your first call note now.</p>
            <button type="button" class="btn btn-dark" id="newCallEmptyBtn" style="width: auto; padding: 0 32px; margin-top: 18px;">+ New Call</button>
          </div>
        </section>

      </div>
    </section>

    <!-- FORM SCREEN (Modal Overlay, hidden by default) -->
    <section class="screen form-screen" id="formScreen">
      <div class="form-card">
        <h1 id="formTitle">New Call</h1>

        <form id="callForm">
          <input type="hidden" id="editNoteIndex" value="-1" />
          
          <div class="field">
            <label for="imageUrl">Image URL</label>
            <input
              type="url"
              id="imageUrl"
              placeholder="https://example.com/photo.jpg"
            />
          </div>

          <div class="field">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              placeholder="Enter full name"
              required
            />
          </div>

          <div class="field">
            <label for="homeTown">Home Town</label>
            <input
              type="text"
              id="homeTown"
              placeholder="Enter home town"
              required
            />
          </div>

          <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input
              type="tel"
              id="phoneNumber"
              placeholder="e.g., +15550199"
              required
            />
          </div>

          <div class="field">
            <label for="purpose">Purpose</label>
            <input
              type="text"
              id="purpose"
              placeholder="e.g., Quick appointment note"
              required
            />
          </div>

          <div class="field">
            <label>Category</label>
            <div class="category-grid">
              <label class="category-pill">
                <input type="radio" name="category" value="Emergency" required />
                <span>Emergency</span>
              </label>

              <label class="category-pill important">
                <input type="radio" name="category" value="Important" />
                <span>Important</span>
              </label>

              <label class="category-pill urgent">
                <input type="radio" name="category" value="Urgent" />
                <span>Urgent</span>
              </label>

              <label class="category-pill">
                <input type="radio" name="category" value="No Rush" />
                <span>No Rush</span>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-dark" id="submitFormBtn">Create Note</button>
          <button type="button" class="btn btn-red" id="closeBtn">Cancel</button>
        </form>
      </div>
    </section>

    <!-- CARD SCREEN (Preserved for compatibility/reference, hidden) -->
    <section class="screen preview-screen" id="previewScreen" style="display: none;">
      <div class="stack-wrap">
        <div class="stack-layer layer-1"></div>
        <div class="stack-layer layer-2"></div>
        <div class="stack-layer layer-3"></div>

        <div class="call-card theme-black" id="callCard">
          <div class="avatar-wrap">
            <img id="previewImage" src="" alt="User" />
          </div>

          <h2 id="previewName">Fatima Uma</h2>

          <div class="info-grid">
            <div class="label-col">
              <p>Home town</p>
              <p>Phone</p>
              <p>Purpose</p>
              <p>Category</p>
            </div>

            <div class="value-col">
              <p id="previewTown">Singapore</p>
              <p id="previewPhone">-</p>
              <p id="previewPurpose">Meeting</p>
              <p id="previewCategory">Important</p>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="action-btn call">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-call"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>Call</span>
            </button>
            <button type="button" class="action-btn message">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-msg"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Message</span>
            </button>
          </div>

        </div>

        <div class="left-controls">
          <button type="button" class="round-btn" id="add-note">+</button>
          <button type="button" class="round-btn" id="prev-card">↑</button>
          <button type="button" class="round-btn" id="next-card">↓</button>
        </div>

        <div class="color-dots">
          <button type="button" class="dot black active-dot" data-theme="black" aria-label="Black theme"></button>
          <button type="button" class="dot purple" data-theme="purple" aria-label="Purple theme"></button>
          <button type="button" class="dot orange" data-theme="orange" aria-label="Orange theme"></button>
          <button type="button" class="dot teal" data-theme="teal" aria-label="Teal theme"></button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
