<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- FORM SCREEN -->
    <section class="screen form-screen active" id="formScreen">
      <div class="form-card">
        <h1>New Call</h1>

        <form id="callForm">
          <div class="field">
            <label for="imageUrl">Image URL</label>
            <input
              type="url"
              id="imageUrl"
              placeholder="https://example.com/photo.jpg"
            />
          </div>

          <div class="field">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              placeholder="Enter full name"
              required
            />
          </div>

          <div class="field">
            <label for="homeTown">Home Town</label>
            <input
              type="text"
              id="homeTown"
              placeholder="Enter home town"
              required
            />
          </div>

          <div class="field">
            <label for="purpose">Purpose</label>
            <input
              type="text"
              id="purpose"
              placeholder="e.g., Quick appointment note"
              required
            />
          </div>

          <div class="field">
            <label>Category</label>
            <div class="category-grid">
              <label class="category-pill">
                <input type="radio" name="category" value="Emergency" required />
                <span>Emergency</span>
              </label>

              <label class="category-pill important">
                <input type="radio" name="category" value="Important" />
                <span>Important</span>
              </label>

              <label class="category-pill urgent">
                <input type="radio" name="category" value="Urgent" />
                <span>Urgent</span>
              </label>

              <label class="category-pill">
                <input type="radio" name="category" value="No Rush" />
                <span>No Rush</span>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-dark">Create Note</button>
          <button type="button" class="btn btn-red" id="closeBtn">Clear Form</button>
        </form>
      </div>
    </section>

    <!-- CARD SCREEN -->
    <section class="screen preview-screen" id="previewScreen">
      <div class="stack-wrap">
        <div class="stack-layer layer-1"></div>
        <div class="stack-layer layer-2"></div>
        <div class="stack-layer layer-3"></div>

        <div class="call-card theme-black" id="callCard">
          <div class="avatar-wrap">
            <img id="previewImage" src="" alt="User" />
          </div>

          <h2 id="previewName">Fatima Uma</h2>

          <div class="info-grid">
            <div class="label-col">
              <p>Home town</p>
              <p>Purpose</p>
              <p>Category</p>
            </div>

            <div class="value-col">
              <p id="previewTown">Singapore</p>
              <p id="previewPurpose">Meeting</p>
              <p id="previewCategory">Important</p>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="action-btn call">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-call"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>Call</span>
            </button>
            <button type="button" class="action-btn message">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-msg"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Message</span>
            </button>
          </div>

        </div>

        <div class="left-controls">
          <button type="button" class="round-btn" id="add-note">+</button>
          <button type="button" class="round-btn" id="prev-card">↑</button>
          <button type="button" class="round-btn" id="next-card">↓</button>
        </div>

        <div class="color-dots">
          <button type="button" class="dot black active-dot" data-theme="black" aria-label="Black theme"></button>
          <button type="button" class="dot purple" data-theme="purple" aria-label="Purple theme"></button>
          <button type="button" class="dot orange" data-theme="orange" aria-label="Orange theme"></button>
          <button type="button" class="dot teal" data-theme="teal" aria-label="Teal theme"></button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
